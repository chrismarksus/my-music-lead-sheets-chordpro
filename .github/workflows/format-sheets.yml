name: Auto-format sheets

on:
  push:
    branches: [master]
    paths: ['sheets/**']

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node scripts/format-sheets.js
      - run: |
          if ! git diff --quiet -- sheets/ INDEX.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -- sheets/ INDEX.md
            git commit -m "Auto-format sheet(s) added via GitHub UI"
            git push
          fi
